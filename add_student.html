{% extends "base.html" %}

{% block content %}
<style>
    .page-header {
        background: linear-gradient(135deg, #000102ff 0%, #11af03ff 100%);
        color: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .page-header .material-icons {
        font-size: 48px;
    }
    
    .page-header h2 {
        margin: 0;
        font-size: 32px;
    }
    
    .form-card {
        background: white;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        max-width: 600px;
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
    }
    
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #019e01ff;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }
    
    .btn-form {
        flex: 1;
        padding: 14px 24px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s;
        text-decoration: none;
    }
    
    .btn-form.primary {
        background: linear-gradient(135deg, #000000ff 0%, #059400ff 100%);
        color: white;
    }
    
    .btn-form.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(9, 168, 4, 0.4);
    }
    
    .btn-form.secondary {
        background: #f5f5f5;
        color: #666;
    }
    
    .btn-form.secondary:hover {
        background: #e0e0e0;
    }
    
    .input-icon {
        color: #019c09ff;
    }
</style>

<div class="page-header">
    <span class="material-icons">person_add</span>
    <div>
        <h2>Add New Student</h2>
        <p style="margin: 5px 0 0 0; opacity: 0.9; font-size: 14px;">Fill in the student information below</p>
    </div>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">badge</span>
                Student ID
            </label>
            <input type="text" name="student_id" placeholder="Enter student ID" required>
        </div>
        
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">person</span>
                Full Name
            </label>
            <input type="text" name="name" placeholder="Enter student name" required>
        </div>
        
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">school</span>
                Program
            </label>
            <input type="text" name="program" placeholder="e.g., Computer Science, Engineering" required>
        </div>
        
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">calendar_today</span>
                Year Level
            </label>
            <select name="year" required>
                <option value="">Select year level</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-form primary">
                <span class="material-icons">save</span>
                Add Student
            </button>
            <a href="/" class="btn-form secondary">
                <span class="material-icons">cancel</span>
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
