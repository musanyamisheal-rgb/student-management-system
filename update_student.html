{% extends "base.html" %}

{% block content %}
<style>
    .page-header {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .page-header .material-icons {
        font-size: 48px;
    }
    
    .page-header h2 {
        margin: 0;
        font-size: 32px;
    }
    
    .form-card {
        background: white;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        max-width: 600px;
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
    }
    
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #f093fb;
        box-shadow: 0 0 0 3px rgba(240, 147, 251, 0.1);
    }
    
    .form-group input:disabled {
        background: #f5f5f5;
        color: #999;
        cursor: not-allowed;
    }
    
    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }
    
    .btn-form {
        flex: 1;
        padding: 14px 24px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s;
        text-decoration: none;
    }
    
    .btn-form.primary {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
    }
    
    .btn-form.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(240, 147, 251, 0.4);
    }
    
    .btn-form.secondary {
        background: #f5f5f5;
        color: #666;
    }
    
    .btn-form.secondary:hover {
        background: #e0e0e0;
    }
    
    .input-icon {
        color: #f093fb;
    }
    
    .not-found {
        text-align: center;
        padding: 40px;
        color: #dc3545;
    }
    
    .not-found .material-icons {
        font-size: 64px;
        margin-bottom: 15px;
    }
</style>

<div class="page-header">
    <span class="material-icons">edit</span>
    <div>
        <h2>Update Student</h2>
        <p style="margin: 5px 0 0 0; opacity: 0.9; font-size: 14px;">Modify student information</p>
    </div>
</div>

{% if student %}
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">badge</span>
                Student ID
            </label>
            <input type="text" value="{{ student.student_id }}" disabled>
        </div>
        
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">person</span>
                Full Name
            </label>
            <input type="text" name="name" value="{{ student.name }}" placeholder="Enter student name" required>
        </div>
        
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">school</span>
                Program
            </label>
            <input type="text" name="program" value="{{ student.program }}" placeholder="Enter program" required>
        </div>
        
        <div class="form-group">
            <label>
                <span class="material-icons input-icon">calendar_today</span>
                Year Level
            </label>
            <select name="year" required>
                <option value="1" {% if student.year == '1' %}selected{% endif %}>1st Year</option>
                <option value="2" {% if student.year == '2' %}selected{% endif %}>2nd Year</option>
                <option value="3" {% if student.year == '3' %}selected{% endif %}>3rd Year</option>
                <option value="4" {% if student.year == '4' %}selected{% endif %}>4th Year</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-form primary">
                <span class="material-icons">save</span>
                Update Student
            </button>
            <a href="/" class="btn-form secondary">
                <span class="material-icons">cancel</span>
                Cancel
            </a>
        </div>
    </form>
</div>
{% else %}
<div class="form-card">
    <div class="not-found">
        <span class="material-icons">error_outline</span>
        <h3>Student not found!</h3>
        <a href="/" class="btn-form secondary" style="max-width: 200px; margin: 20px auto 0;">
            <span class="material-icons">arrow_back</span>
            Back to Home
        </a>
    </div>
</div>
{% endif %}
{% endblock %}
